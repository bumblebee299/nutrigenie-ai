version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    container_name: nutrigenie_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
    networks:
      - nutrigenie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    container_name: nutrigenie_frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - nutrigenie_net
    restart: unless-stopped

  # ── Redis (API response cache) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nutrigenie_redis
    ports:
      - "6379:6379"
    networks:
      - nutrigenie_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  nutrigenie_net:
    driver: bridge
